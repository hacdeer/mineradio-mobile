name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fix HTML module attribute
        run: |
          node -e "
          const fs = require('fs');
          let html = fs.readFileSync('public/index.html', 'utf8');
          html = html.replace(/src=\"vendor\/three\.r128\.min\.js\"/g, 'src=\"vendor/three.r128.min.js\" type=\"module\"');
          html = html.replace(/src=\"vendor\/music-tempo\.min\.js\"/g, 'src=\"vendor/music-tempo.min.js\" type=\"module\"');
          html = html.replace(/src=\"vendor\/gsap\.min\.js\"/g, 'src=\"vendor/gsap.min.js\" type=\"module\"');
          fs.writeFileSync('public/index.html', html, 'utf8');
          "

      - name: Build Web Frontend
        run: npm run build

      - name: Initialize and Sync Capacitor iOS
        run: |
          # 自动初始化并添加缺少的 ios 原生目录
          npx cap add ios
          npx cap sync ios

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_REQUIRED=NO \
                     clean build

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r mineradio-unsigned.ipa Payload

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: mineradio-unsigned-ipa
          path: mineradio-unsigned.ipa
