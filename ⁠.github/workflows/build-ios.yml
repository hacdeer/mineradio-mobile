name: Build Unsigned iOS IPA

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # 修复了这里的参数错误
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Frontend
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios/App
          # 指定了 -derivedDataPath build，确保后面 100% 能找到文件
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_REQUIRED=NO \
                     clean build

      - name: Package to IPA
        run: |
          mkdir -p Payload
          # 提取编译出来的 .app 并放入 Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r mineradio-unsigned.ipa Payload

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: mineradio-unsigned-ipa
          path: mineradio-unsigned.ipa
